# Netlify deploy config — sito Astro statico (nessun adapter necessario)
[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  # Astro 7 richiede Node >= 22.12 (il default di Netlify è troppo vecchio)
  NODE_VERSION = "22.12.0"
  # Fix corepack "Cannot find matching keyid": le chiavi di firma incluse in
  # corepack su Netlify sono troppo vecchie per verificare pnpm 11 → disabilita
  # il controllo firma così corepack può installare pnpm.
  COREPACK_INTEGRITY_KEYS = "0"

# Cache degli asset con hash (immutabili) generati da Astro
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
